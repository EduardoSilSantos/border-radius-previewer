<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Border-Radius Previewer</title>
</head>

<body>
    <div class="container">
        <div class="box"></div>
        <form onreset="formReset()">
            <div class="controllerPicker">
                <button type="button" onclick="showController(event)">Top Left</button>
                <button type="button" onclick="showController(event)">Top Right</button>
                <button type="button" onclick="showController(event)">Bottom Right</button>
                <button type="button" onclick="showController(event)">Bottom Left</button>
            </div>
            <h3>Top Left</h3>

            <label style="display: inline;" class="box-controller top-left" for="top-left">Top Left</label>
            <input style="display: inline-block;" class="box-controller top-left" type="range" id="top-left">

            <label class="box-controller top-right" for="top-right">Top Right</label>
            <input class="box-controller top-right" type="range" id="top-right">


            <label class="box-controller bottom-right" for="bottom-right">Bottom Right</label>
            <input class="box-controller bottom-right" type="range" id="bottom-right">

            <label class="box-controller bottom-left" for="bottom-left">Bottom Left</label>
            <input class="box-controller bottom-left" type="range" id="bottom-left">

            <input type="reset" value="Reset">

            <label for="output">Border-Radius:</label>
            <input type="text" id="output">
            <button type="button" onclick="copy()">Copy</button>
        </form>

    </div>
    <script src=" script.js"></script>
</body>

</html>
